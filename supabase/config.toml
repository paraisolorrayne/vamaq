# Supabase project config (managed by Supabase CLI).
# Docs: https://supabase.com/docs/reference/cli/config

project_id = "vamaq-motors"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "25MiB"

[auth]
enabled = true
# URL pública do site (produção). Ajuste para seu domínio real.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "https://vamaqmotors.com.br"]
jwt_expiry = 3600
enable_signup = false  # Admin cria usuários manualmente; sem auto-signup

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

# OAuth providers podem ser habilitados conforme necessidade.
